<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dean Calisthenics Trainer — Designs & Prototypes</title>
    <style>
        :root {
            color-scheme: light dark;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            line-height: 1.6;
        }
        h1 {
            margin-bottom: 0.25rem;
        }
        p.subtitle {
            color: #666;
            margin-top: 0;
        }
        ul.prototypes {
            list-style: none;
            padding: 0;
        }
        ul.prototypes li {
            margin: 0.75rem 0;
        }
        ul.prototypes a {
            display: block;
            padding: 1rem 1.25rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        ul.prototypes a:hover {
            background: rgba(0, 0, 0, 0.04);
            border-color: #999;
        }
        ul.prototypes a strong {
            display: block;
            font-size: 1.05rem;
        }
        ul.prototypes li > strong {
            display: block;
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
        }
        ul.prototypes img {
            display: block;
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
    </style>
</head>
